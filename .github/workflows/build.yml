name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  GO_VERSION: "1.22"
  SINGBOX_GO_VERSION: "1.24.x"
  SINGBOX_VERSION: "stable"
  SINGBOX_TAGS: "with_quic,with_wireguard,with_utls,with_clash_api,badlinkname,tfogo_checklinkname0"
  ANDROID_API: "23"
  ANDROID_NDK_VERSION: "27.2.12479018"

jobs:
  # ============================================================
  # Job -1: Privacy/static policy guardrails
  # ============================================================
  privacy-lint:
    name: Privacy Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check APK privacy surface
        run: bash .github/scripts/check_apk_privacy.sh

  # ============================================================
  # Job 0: Resolve sing-box release tag
  # ============================================================
  resolve-singbox:
    name: Resolve sing-box release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - name: Resolve sing-box release
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          case "${SINGBOX_VERSION}" in
            stable|"")
              VERSION="$(gh release view --repo SagerNet/sing-box --json tagName --jq .tagName)"
              ;;
            latest|alpha|prerelease)
              VERSION="$(gh release list --repo SagerNet/sing-box --limit 1 --json tagName --jq '.[0].tagName')"
              ;;
            *)
              VERSION="v${SINGBOX_VERSION#v}"
              ;;
          esac
          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "Failed to resolve sing-box release" >&2
            exit 1
          fi
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"
          echo "ref=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved sing-box $VERSION"

  # ============================================================
  # Job 1: Build Go daemon (privd + privctl) for Android ABIs
  # ============================================================
  build-daemon:
    name: Build Daemon (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            goarch: arm64
            goarm: ""
          - arch: armv7
            goarch: arm
            goarm: "7"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build privd
        working-directory: daemon
        run: |
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="dev-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          fi
          mkdir -p "../out/${{ matrix.arch }}"
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} go build \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o "../out/${{ matrix.arch }}/privd" ./cmd/privd

      - name: Build privctl
        working-directory: daemon
        run: |
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="dev-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          fi
          mkdir -p "../out/${{ matrix.arch }}"
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} go build \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o "../out/${{ matrix.arch }}/privctl" ./cmd/privctl

      - name: Upload daemon artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daemon-${{ matrix.arch }}
          path: out/${{ matrix.arch }}/
          retention-days: 1

  # ============================================================
  # Job 2: Build Android sing-box binaries for Android module runtime
  # ============================================================
  build-singbox:
    name: Build sing-box (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [resolve-singbox]
    env:
      SINGBOX_RESOLVED_VERSION: ${{ needs.resolve-singbox.outputs.version }}
      SINGBOX_REF: ${{ needs.resolve-singbox.outputs.ref }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            goarch: arm64
            goarm: ""
            cc: aarch64-linux-android23-clang
            linker: /system/bin/linker64
          - arch: armv7
            goarch: arm
            goarm: "7"
            cc: armv7a-linux-androideabi23-clang
            linker: /system/bin/linker
    steps:
      - name: Checkout sing-box
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: ${{ env.SINGBOX_REF }}
          path: sing-box-src

      - name: Setup Go for sing-box
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.SINGBOX_GO_VERSION }}
          cache-dependency-path: sing-box-src/go.sum

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "$SDKMANAGER" ]]; then
            SDKMANAGER="$(command -v sdkmanager || true)"
          fi
          if [[ -z "$SDKMANAGER" ]]; then
            echo "sdkmanager not found" >&2
            exit 127
          fi
          yes | "$SDKMANAGER" --licenses >/dev/null
          "$SDKMANAGER" --install "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Build Android sing-box
        run: |
          mkdir -p "out/${{ matrix.arch }}"
          cd sing-box-src
          LDFLAGS="$(cat release/LDFLAGS)"
          export CC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.cc }}"
          CGO_ENABLED=1 GOOS=android GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} go build \
            -trimpath \
            -tags "${SINGBOX_TAGS}" \
            -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${SINGBOX_RESOLVED_VERSION}' ${LDFLAGS} -s -w -buildid=" \
            -o "../out/${{ matrix.arch }}/sing-box" ./cmd/sing-box
          cd ..
          chmod 755 "out/${{ matrix.arch }}/sing-box"
          if ! readelf -l "out/${{ matrix.arch }}/sing-box" | grep -q "Requesting program interpreter: ${{ matrix.linker }}"; then
            echo "ERROR: sing-box is not an Android PIE binary for ${{ matrix.arch }}"
            readelf -l "out/${{ matrix.arch }}/sing-box"
            exit 1
          fi
          readelf -h "out/${{ matrix.arch }}/sing-box"
          sha256sum "out/${{ matrix.arch }}/sing-box"

      - name: Upload sing-box artifact
        uses: actions/upload-artifact@v4
        with:
          name: singbox-${{ matrix.arch }}
          path: out/${{ matrix.arch }}/
          retention-days: 1

  # ============================================================
  # Job 3: Assemble Magisk module ZIP
  # ============================================================
  build-module:
    name: Build Magisk Module
    runs-on: ubuntu-latest
    needs: [resolve-singbox, build-daemon, build-singbox]
    outputs:
      singbox_version: ${{ needs.resolve-singbox.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download daemon binaries
        uses: actions/download-artifact@v4
        with:
          name: daemon-arm64
          path: module/binaries/arm64/

      - name: Download daemon binaries (armv7)
        uses: actions/download-artifact@v4
        with:
          name: daemon-armv7
          path: module/binaries/armv7/

      - name: Download sing-box binary
        uses: actions/download-artifact@v4
        with:
          name: singbox-arm64
          path: module/binaries/arm64/

      - name: Download sing-box binary (armv7)
        uses: actions/download-artifact@v4
        with:
          name: singbox-armv7
          path: module/binaries/armv7/

      - name: Set permissions
        run: chmod 755 module/binaries/arm64/* module/binaries/armv7/*

      - name: Stamp version in module.prop
        run: |
          version_code() {
            local raw="${1#v}"
            local major minor patch
            IFS=. read -r major minor patch _ <<< "$raw"
            major="${major:-0}"
            minor="${minor:-0}"
            patch="${patch:-0}"
            echo $((major * 1000 + minor * 100 + patch))
          }
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME}"
            CODE="$(version_code "$VERSION")"
          else
            VERSION="dev-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
            CODE="${GITHUB_RUN_NUMBER}"
          fi
          sed -i "s/^version=.*/version=${VERSION}/" module/module.prop
          sed -i "s/^versionCode=.*/versionCode=${CODE}/" module/module.prop
          cat module/module.prop

      - name: Build ZIP
        run: |
          cd module
          zip -r ../privstack-module.zip . \
            -x "*.git*" "*.DS_Store"
          cd ..
          sha256sum privstack-module.zip

      - name: Upload module ZIP
        uses: actions/upload-artifact@v4
        with:
          name: privstack-module
          path: privstack-module.zip
          retention-days: 5

  # ============================================================
  # Job 4: Build Android APK
  # ============================================================
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [privacy-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Stamp version
        run: |
          version_code() {
            local raw="${1#v}"
            local major minor patch
            IFS=. read -r major minor patch _ <<< "$raw"
            major="${major:-0}"
            minor="${minor:-0}"
            patch="${patch:-0}"
            echo $((major * 1000 + minor * 100 + patch))
          }
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME}"
            VER_NAME="$VERSION"
            VER_CODE="$(version_code "$VERSION")"
          else
            VER_NAME="dev-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
            VER_CODE="${GITHUB_RUN_NUMBER}"
          fi
          # Inject version into build.gradle.kts
          sed -i "s/versionName = \".*\"/versionName = \"${VER_NAME}\"/" app/app/build.gradle.kts
          sed -i "s/versionCode = [0-9]*/versionCode = ${VER_CODE}/" app/app/build.gradle.kts

      - name: Build and sign APK
        working-directory: app
        run: |
          # Build debug APK (auto-signed with debug keystore)
          # For production releases: use assembleRelease with a proper keystore
          ./gradlew assembleDebug --no-daemon --stacktrace
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found!"
            find . -name "*.apk" -ls
            exit 1
          fi
          echo "APK found: $APK"
          cp "$APK" ../privstack-panel.apk
          sha256sum ../privstack-panel.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: privstack-apk
          path: privstack-panel.apk
          retention-days: 5

  # ============================================================
  # Job 5: Create GitHub Release
  # ============================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: [build-module, build-apk]
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        run: |
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME}"
            STABLE=true
          else
            VERSION="dev-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
            STABLE=false
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "stable=${STABLE}" >> "$GITHUB_OUTPUT"

      - name: Download Magisk module
        uses: actions/download-artifact@v4
        with:
          name: privstack-module
          path: release/

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: privstack-apk
          path: release/

      - name: Rename with version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mv release/privstack-module.zip "release/privstack-${VERSION}-module.zip"
          mv release/privstack-panel.apk "release/privstack-${VERSION}-panel.apk"
          # Generate checksums
          cd release && sha256sum * > SHA256SUMS.txt && cd ..

      - name: Update update.json for Magisk manager
        if: steps.version.outputs.stable == 'true'
        run: |
          version_code() {
            local raw="${1#v}"
            local major minor patch
            IFS=. read -r major minor patch _ <<< "$raw"
            major="${major:-0}"
            minor="${minor:-0}"
            patch="${patch:-0}"
            echo $((major * 1000 + minor * 100 + patch))
          }
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_CODE="$(version_code "$VERSION")"
          cat > update.json <<ENDJSON
          {
            "version": "${VERSION}",
            "versionCode": ${VERSION_CODE},
            "zipUrl": "https://github.com/youtubediscord/RKNnoVPN/releases/download/${VERSION}/privstack-${VERSION}-module.zip",
            "changelog": "https://github.com/youtubediscord/RKNnoVPN/releases/tag/${VERSION}"
          }
          ENDJSON
          # Commit and push the updated update.json to main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json
          git diff --cached --quiet || git commit -m "chore: update update.json for ${VERSION} [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: "PrivStack ${{ steps.version.outputs.version }}"
          draft: false
          prerelease: ${{ steps.version.outputs.stable != 'true' }}
          generate_release_notes: true
          body: |
            ## PrivStack ${{ steps.version.outputs.version }}

            ### Downloads

            | File | Description |
            |------|-------------|
            | `privstack-${{ steps.version.outputs.version }}-module.zip` | Magisk/KernelSU/APatch module — flash via manager |
            | `privstack-${{ steps.version.outputs.version }}-panel.apk` | Controller APK — install on same device |

            ### Quick Start

            1. Flash the module ZIP via Magisk Manager / KSU Manager / APatch
            2. Reboot
            3. Install the APK
            4. Open PrivStack Panel → add a server (paste VLESS/Trojan/SS link)
            5. Select apps to proxy in the Apps tab
            6. Tap Connect

            ### What's inside

            - **No VPN, no TUN, no icon** — uses tproxy+iptables at kernel level
            - **Whitelist mode** — only selected apps go through proxy
            - **Full IPv4+IPv6** — mirrored iptables/ip6tables rules
            - **sing-box v${{ needs.build-module.outputs.singbox_version }}** — VLESS, Trojan, VMess, SS, SOCKS, Hysteria2, TUIC
            - **Auto-recovery** — health monitor + rescue on failure
          files: |
            release/privstack-${{ steps.version.outputs.version }}-module.zip
            release/privstack-${{ steps.version.outputs.version }}-panel.apk
            release/SHA256SUMS.txt
